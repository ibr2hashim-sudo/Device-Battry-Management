workflows:
  android-workflow:
    name: Android Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
      vars:
        PACKAGE_NAME: "com.aistudio.batterytracker.qwerty"
      node: latest
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Fix permissions and Build Android APK
        script: |
          chmod +x gradlew || chmod +x ./gradlew || true
          gradle assembleDebug || ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - YOUR_EMAIL@gmail.com
        notify:
          success: true
          failure: true
